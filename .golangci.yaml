# yaml-language-server: $schema=
# Configuration for golangci-lint v2
# The IDE schema validator may show false positives - ignore them
version: "2"

run:
  modules-download-mode: readonly
  tests: true
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocyclo
    - bodyclose
    - contextcheck
    - errorlint
    - unconvert
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable:
        - assign
        - atomic
        - bools
        - copylocks
        - nilfunc
        - printf
        - unmarshal
      enable-all: false
    staticcheck:
      checks:
        - all
    gocyclo:
      min-complexity: 15
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - std-error-handling
    rules:
      - linters:
          - contextcheck
        path: internal/ratelimit/limiter\.go
        text: "Non-inherited new context"
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - gocyclo
        path: _test\.go
      - linters:
          - errcheck
        path: internal/output/formatter\.go
        text: "Error return value of `fmt.(Fprintln|Fprintf)` is not checked"
    paths:
      - third_party$
      - vendor$
      - examples$

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  new: false

formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - vendor$
      - examples$
